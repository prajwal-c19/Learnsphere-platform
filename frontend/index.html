<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="description" content="LearnSphere — a premium learning experience platform for modern teams." />

    <!-- Preconnect + premium typography (Inter / Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>LearnSphere — Learning Experience Platform</title>

    <!-- Pre-paint background so the app never flashes plain white while JS loads -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background-color: #F8FAFC;
        background-image:
          radial-gradient(circle at 8% 8%, rgba(79, 70, 229, 0.22), transparent 42%),
          radial-gradient(circle at 92% 0%, rgba(139, 92, 246, 0.20), transparent 46%),
          radial-gradient(circle at 15% 95%, rgba(99, 102, 241, 0.18), transparent 45%),
          radial-gradient(circle at 90% 85%, rgba(236, 72, 153, 0.12), transparent 40%);
        background-attachment: fixed;
        background-repeat: no-repeat;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
